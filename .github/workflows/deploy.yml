name: Build and deploy GH Pages

on:
  push:
    branches:
      - main
      - preview

  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: gh-pages-deployment
  cancel-in-progress: false

jobs:

  deploy_production:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Determine Base URL
        id: check_cname
        run: |
          if [ -f CNAME ]; then
            echo "BASE_URL=https://$(head -n 1 CNAME)/" >> $GITHUB_OUTPUT
          else
            echo "BASE_URL=/${{ github.event.repository.name }}/" >> $GITHUB_OUTPUT
          fi

      - name: Build
        uses: shalzz/zola-deploy-action@v0.21.0
        env:
          BUILD_ONLY: true
          BUILD_FLAGS: --base-url ${{ steps.check_cname.outputs.BASE_URL }}

      - name: Deploy production
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages
          cd gh-pages

          git checkout gh-pages || git checkout --orphan gh-pages

          git config user.name github-actions
          git config user.email github-actions@github.com

          find . -mindepth 1 ! -name '.git' ! -name 'preview' -exec rm -rf {} +

          cp -r ../public/* .

          git add .
          git commit -m "Deploy production from ${{ github.sha }}" || echo "No changes"
          git push origin gh-pages


  deploy_preview:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/preview' || github.event_name == 'pull_request_target'

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          submodules: recursive

      - name: Determine Preview Folder
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            echo "FOLDER=pr-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
          else
            echo "FOLDER=preview" >> $GITHUB_ENV
          fi

      - name: Build preview
        uses: shalzz/zola-deploy-action@v0.21.0
        env:
          BUILD_ONLY: true
          BUILD_FLAGS: --base-url /${{ github.event.repository.name }}/${{ env.FOLDER }}/

      - name: Deploy preview
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages
          cd gh-pages

          git checkout gh-pages || git checkout --orphan gh-pages

          git config user.name github-actions
          git config user.email github-actions@github.com

          rm -rf ${{ env.FOLDER }}
          mkdir -p ${{ env.FOLDER }}

          cp -r ../public/* ${{ env.FOLDER }}/

          git add ${{ env.FOLDER }}
          git commit -m "Deploy preview ${{ env.FOLDER }} from ${{ github.sha }}" || echo "No changes"
          git push origin gh-pages
