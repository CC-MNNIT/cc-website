name: Build and deploy GH Pages

on:
  push:
    branches:
      - main
      - preview
  pull_request:
    types: [opened, synchronize, reopened]

# Grant GITHUB_TOKEN the permissions to push to the repo
permissions:
  contents: write

# Prevent concurrent deployments to gh-pages
concurrency:
  group: gh-pages-deployment
  cancel-in-progress: false

jobs:
  # Deploy to production (root of gh-pages)
  deploy_production:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Fetches the 'goyo' theme

      - name: Determine Base URL
        id: check_cname
        run: |
          if [ -f CNAME ]; then
            echo "BASE_URL=https://$(head -n 1 CNAME)/" >> $GITHUB_OUTPUT
          else
            echo "BASE_URL=/${{ github.event.repository.name }}/" >> $GITHUB_OUTPUT
          fi

      - name: Build production
        uses: shalzz/zola-deploy-action@v0.21.0
        env:
          PAGES_BRANCH: gh-pages
          BUILD_ONLY: true
          BUILD_FLAGS: --base-url ${{ steps.check_cname.outputs.BASE_URL }}

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-repo
          fetch-depth: 0

      - name: Deploy to root (preserve preview folder)
        run: |
          cd gh-pages-repo
          
          # Configure git
          git config user.name github-actions
          git config user.email github-actions@github.com
          
          # Remove everything except .git, preview folder, and CNAME
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name 'preview' ! -name 'CNAME' -exec rm -rf {} +
          
          # Copy production files
          cp -r ../public/* .
          
          # Commit and push
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Deploy production from ${{ github.sha }}" && git push)

  # Deploy to preview (preview subfolder of gh-pages)
  deploy_preview:
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/preview' || github.event_name == 'pull_request')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Fetches the 'goyo' theme

      - name: Determine Preview Base URL
        id: check_cname_preview
        run: |
          FOLDER="preview"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FOLDER="pr-${{ github.event.pull_request.number }}"
          fi
          echo "FOLDER=$FOLDER" >> $GITHUB_ENV

          if [ -f CNAME ]; then
            echo "BASE_URL=https://$(head -n 1 CNAME)/$FOLDER/" >> $GITHUB_OUTPUT
          else
            echo "BASE_URL=/${{ github.event.repository.name }}/$FOLDER/" >> $GITHUB_OUTPUT
          fi

      - name: Build preview
        uses: shalzz/zola-deploy-action@v0.21.0
        env:
          PAGES_BRANCH: gh-pages
          BUILD_ONLY: true
          BUILD_FLAGS: --base-url ${{ steps.check_cname_preview.outputs.BASE_URL }}

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-repo
          fetch-depth: 0

      - name: Deploy to preview subfolder
        run: |
          cd gh-pages-repo
          
          # Configure git
          git config user.name github-actions
          git config user.email github-actions@github.com
          
          # Remove old preview and deploy new one
          rm -rf ${{ env.FOLDER }}
          mkdir -p ${{ env.FOLDER }}
          cp -r ../public/* ${{ env.FOLDER }}/
          
          # Commit and push
          git add ${{ env.FOLDER }}
          git diff --quiet && git diff --staged --quiet || (git commit -m "Deploy preview to ${{ env.FOLDER }} from ${{ github.sha }}" && git push)
